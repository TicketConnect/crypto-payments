services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_DB: depositoor
      POSTGRES_PASSWORD: dev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  api:
    build:
      context: ./backend
    command: ["api"]
    ports:
      - "3001:3001"
    environment:
      DATABASE_URL: postgres://postgres:dev@postgres/depositoor
      LISTEN_ADDR: "0.0.0.0:3001"
      RELAYER_PRIVATE_KEY: "${RELAYER_PRIVATE_KEY}"
      IMPLEMENTATION_ADDRESS: "${IMPLEMENTATION_ADDRESS}"
      FEE_BPS: "50"
    depends_on:
      - postgres

volumes:
  pgdata:
