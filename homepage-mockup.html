<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Depositoor</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;450;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #050506;
      --card: #0a0a0c;
      --surface: #101012;
      --surface-hover: #161618;
      --ring: rgba(255, 255, 255, 0.04);
      --ring-hover: rgba(255, 255, 255, 0.07);
      --ring-active: rgba(255, 255, 255, 0.1);
      --text-primary: #fafafa;
      --text-secondary: #71717a;
      --text-muted: #3f3f46;
      --accent: #2775CA;
      --success: #22c55e;
      --danger: #dc2626;
      --radius: 12px;
      --radius-lg: 16px;
      --font: 'Plus Jakarta Sans', system-ui, -apple-system, sans-serif;
      --font-mono: 'IBM Plex Mono', 'SF Mono', monospace;
    }

    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text-primary);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.7' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      opacity: 0.02;
      pointer-events: none;
      z-index: 0;
      mix-blend-mode: overlay;
    }

    .root {
      position: relative;
      z-index: 1;
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    button {
      font-family: var(--font);
    }

    /* App */
    .app {
      width: 100%;
      max-width: 400px;
      display: flex;
      flex-direction: column;
    }

    .main-card {
      background: var(--card);
      border-radius: 20px;
      padding: 20px 20px 24px;
      display: flex;
      flex-direction: column;
      gap: 20px;
      height: 420px;
      box-shadow:
        0 0 0 1px var(--ring),
        0 2px 8px -2px rgba(0, 0, 0, 0.3),
        0 24px 56px -12px rgba(0, 0, 0, 0.5);
    }

    .card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }

    .card-title {
      font-size: 15px;
      font-weight: 600;
      color: var(--text-secondary);
      flex: 1;
      text-align: center;
    }

    .card-body {
      flex: 1;
      min-height: 0;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
    }

    /* Deposit Methods */
    .deposit-methods {
      display: flex;
      flex-direction: column;
      gap: 12px;
      flex: 1;
      justify-content: center;
    }

    .method-row {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      padding: 14px 16px;
      background: var(--surface);
      border: 1px solid var(--ring);
      border-radius: 14px;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
      text-align: left;
      font-family: inherit;
      color: inherit;
    }

    .method-row:hover {
      background: var(--surface-hover);
      border-color: var(--ring-hover);
    }

    .method-icon {
      width: 42px;
      height: 42px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .method-icon--default {
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid var(--ring);
      color: #fafafa;
    }

    .method-icon--peer {
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid var(--ring);
    }

    .method-text {
      display: flex;
      flex-direction: column;
      gap: 5px;
      flex: 1;
      min-width: 0;
    }

    .method-title {
      font-size: 13px;
      font-weight: 600;
      color: var(--text-primary);
      letter-spacing: -0.01em;
      white-space: nowrap;
    }

    .method-subtitle {
      font-size: 11px;
      font-weight: 450;
      color: var(--text-secondary);
      white-space: nowrap;
    }

    .method-chains {
      display: flex;
      gap: 3px;
      margin-left: auto;
      flex-shrink: 0;
      align-self: flex-start;
      padding-top: 2px;
    }

    /* Chain logo */
    .chain-logo {
      overflow: hidden;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .chain-logo img {
      display: block;
    }

    /* Peer method logo */
    .peer-logo {
      overflow: hidden;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .peer-logo img {
      display: block;
      object-fit: contain;
    }

    /* Destination Panel */
    .dest-panel {
      position: fixed;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 100%;
      max-width: 400px;
      background: var(--card);
      border-radius: 16px 16px 0 0;
      box-shadow:
        0 0 0 1px var(--ring),
        0 -4px 24px -4px rgba(0, 0, 0, 0.4);
      overflow: hidden;
      z-index: 10;
    }

    .dest-header {
      display: flex;
      align-items: center;
      gap: 10px;
      width: 100%;
      padding: 14px 18px;
      background: transparent;
      border: none;
      cursor: pointer;
      font-family: inherit;
      color: inherit;
    }

    .dest-header-label {
      font-size: 11px;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .dest-header-summary {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-left: auto;
      font-size: 13px;
    }

    .dest-header-chain {
      color: var(--text-secondary);
      font-weight: 500;
    }

    .dest-header-addr {
      color: var(--text-muted);
      font-family: var(--font-mono);
      font-size: 12px;
    }

    .dest-chevron {
      color: var(--text-muted);
      flex-shrink: 0;
    }
  </style>
</head>
